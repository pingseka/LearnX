services:
  frontend:
    image: learnx/frontend:local
    mem_limit: 256m
    cpus: 0.50
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    ports: !override
      - "127.0.0.1:3100:3000"

  backend:
    image: learnx/backend:local
    mem_limit: 256m
    cpus: 0.50
    build:
      context: ./backend
    ports: !override
      - "127.0.0.1:3101:3001"
