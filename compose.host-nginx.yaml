services:
  frontend:
    image: learnx/frontend:local
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    ports:
      - "127.0.0.1:3100:3000"

  backend:
    image: learnx/backend:local
    build:
      context: ./backend
    ports:
      - "127.0.0.1:3101:3001"

