services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${VERSION:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${VERSION:-latest}
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - APP_VERSION=${VERSION:-latest}
      - DB_STORAGE=/app/data/database.sqlite
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - MONITORING_TOKEN_FILE=/run/secrets/monitoring_token
      - CORS_ORIGIN=https://${DOMAIN}
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com/v1}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
    volumes:
      - backend_data:/app/data
      - uploads:/app/uploads
    secrets:
      - jwt_secret
      - monitoring_token
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend_data:
  uploads:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  monitoring_token:
    file: ./secrets/monitoring_token.txt
